# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
COMMON_FLAGS="-O2 -pipe -march=znver3"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
RUSTFLAGS="${RUSTFLAGS} -C target-cpu=znver3"

# Input devices settings
INPUT_DEVICES="libinput"

# of threads for the compilations:
MAKEOPTS="-j4"

# Support for linguas:
L10N="en en-GB es es-MX"

# Support for video cards:
VIDEO_CARDS="amdgpu nvidia radeonsi"

# License accepted by default:
ACCEPT_LICENSE="-* @FREE"

# Let's live in the cutting edge :P
ACCEPT_KEYWORDS="~amd64"

# Portage's default options.
EMERGE_DEFAULT_OPTS="${EMERGE_DEFAULT_OPTS} --ask --ask-enter-invalid \
--jobs=1 --load-average=11.90 --verbose \
--verbose-conflicts --keep-going=y"

# My CPU's supported flags (AMD Ryzen 5 7535HS):
CPU_FLAGS_X86="aes avx avx2 bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 sse4a ssse3 vpclmulqdq"

# NOTE: This stage was built with the bindist Use flag enabled
PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C.utf8

# Qemu options:
QEMU_SOFTMMU_TARGETS="x86_64"
QEMU_USER_TARGETS="x86_64"

# Mirrors:
GENTOO_MIRRORS="https://mirrors.kernel.org/gentoo/ https://mirrors.rit.edu/gentoo/ https://gentoo.osuosl.org/"

USE="${USE} X aac activities alsa bluetooth cairo cups dbus flac gif gmp gpm gtk gui harfbuzz icu jpeg jpeg2k jpegxl kde kwallet libnotify modules-sign mp3 mp4 mpeg \
networkmanager nvidia nvenc ogg opengl opus pdf pipewire plasma png policykit pulseaudio qml qt6 screencast secureboot semantic-desktop sdl spell sound sound-server startup-notification \
svg text tiff truetype udev udisks unicode upower usb vdpau vulkan v4l wayland widgets xcb xft xv xvid x264 x265"

MODULES_SIGN_KEY="/mnt/kernel_signing/kernel_key.pem"
MODULES_SIGN_HASH="sha512"

SECUREBOOT_SIGN_KEY="/mnt/efikeys/db.key"
SECUREBOOT_SIGN_CERT="/mnt/efikeys/db.crt"

FETCHCOMMAND="curl --retry 3 --connect-timeout 60 -L -o \"\${DISTDIR}/\${FILE}\" \"\${URI}\""
RESUMECOMMAND="curl -C - --retry 3 --connect-timeout 60 -L -o \"\${DISTDIR}\/\${FILE}\" \"\${URI}\""
